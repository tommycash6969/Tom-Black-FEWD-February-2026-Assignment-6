<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Open+Sans:ital,wght@0,400;0,600;1,400&display=swap">
  <link rel="stylesheet" href="contact.css">
  <title>Contact | FreeLivingDesigns</title>
</head>
<body>
  <main class="contact-page" aria-labelledby="contact-heading">
    <a class="back-link" id="back-link" href="../index.html">Back to Portfolio</a>

    <section class="contact-card">
      <h1 id="contact-heading">Contact Form</h1>
      <p class="intro">Send me a message and I will get back to you soon.</p>

      <form id="contact-form" novalidate>
        <div class="form-group">
          <label for="name">Name <span id="name-helper" class="field-helper">(used for naming purpose)</span></label>
          <input id="name" name="name" type="text" autocomplete="name" required>
          <p id="name-error" class="error-message" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="email">Email <span id="email-helper" class="field-helper">(used for contact purpose)</span></label>
          <input id="email" name="email" type="email" autocomplete="email" required>
          <p id="email-error" class="error-message" aria-live="polite"></p>
        </div>

        <div class="form-group">
          <label for="message">Message <span id="message-helper" class="field-helper">(used for detailed response and feedback)</span></label>
          <textarea id="message" name="message" rows="5" required></textarea>
          <p id="message-error" class="error-message" aria-live="polite"></p>
        </div>

        <button type="submit" class="submit-btn">Submit</button>
      </form>
    </section>
  </main>

  <div id="submission-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="modal-heading">
    <div class="modal-content">
      <h2 id="modal-heading">Message Submitted</h2>
      <div class="submitted-details">
        <p><strong>Name:</strong> <span id="modal-name"></span></p>
        <p><strong>Email:</strong> <span id="modal-email"></span></p>
        <p><strong>Message:</strong> <span id="modal-message"></span></p>
      </div>
      <button type="button" id="close-modal" class="close-btn">Close</button>
    </div>
  </div>

  <script src="contactscript.js"></script>
</body>
</html>
